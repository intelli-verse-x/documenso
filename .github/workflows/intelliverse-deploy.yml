name: Intelliverse Deploy Trigger

# Auto-deploys future commits to the Intelliverse + Toba Tech EKS cluster.
#
# Flow: a push to `main` runs the existing "Continuous Integration" workflow
# (build app + docker). Only when that succeeds do we notify the infra repo
# (intelli-verse-x/intelli-verse-kube-infra), whose `documenso-build.yml`
# rebuilds the branded image for this exact commit and rolls it out to EKS.
#
# This keeps the heavy build/deploy logic + cloud credentials in the infra repo
# (house convention) while giving us CI-gated continuous deployment from code.

on:
  workflow_run:
    workflows: ['Continuous Integration']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA / ref to deploy (defaults to main HEAD)'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: intelliverse-deploy
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # On workflow_run, only proceed if CI actually succeeded. Manual dispatches
    # always proceed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Resolve deploy ref
        id: ref
        run: |
          REF="${{ github.event.inputs.ref || github.event.workflow_run.head_sha || 'main' }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Dispatching deploy for ref: $REF"

      - name: Trigger infra build & deploy
        env:
          # PAT with `repo` scope on intelli-verse-x/intelli-verse-kube-infra.
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "$INFRA_DISPATCH_TOKEN" ]; then
            echo "::error::INFRA_DISPATCH_TOKEN secret is not set. See intelliverse/README.md (CI/CD)."
            exit 1
          fi

          http_code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $INFRA_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/intelli-verse-x/intelli-verse-kube-infra/dispatches \
            -d "$(printf '{"event_type":"documenso-deploy","client_payload":{"ref":"%s"}}' "${{ steps.ref.outputs.ref }}")")

          echo "GitHub API responded: $http_code"
          if [ "$http_code" != "204" ]; then
            cat /tmp/resp.json || true
            echo "::error::repository_dispatch failed (expected 204)."
            exit 1
          fi
          echo "Deploy dispatched to intelli-verse-kube-infra (documenso-deploy)."
